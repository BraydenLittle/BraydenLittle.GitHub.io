<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Resume - Brayden Little</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        /* Password overlay styles */
        #password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #password-popup {
            position: relative;
            width: 300px;
            padding: 20px;
            border: 2px solid white;
            border-radius: 8px;
            background-color: black;
            color: white;
            text-align: center;
            box-shadow: 0 4px 8px rgba(255, 255, 255, 0.2);
        }

        #password-popup h2 {
            margin-bottom: 20px;
        }

        #password-input {
            padding: 10px;
            font-size: 16px;
            width: 100%;
            background-color: black;
            border: 2px solid white;
            color: white;
            text-align: center;
            border-radius: 5px;
        }

        #password-submit {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: black;
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            outline: none;
            margin-top: 10px;
        }

        /* Canvas for Erasable Overlay */
       #erasable-overlay {
        position: fixed; /* Cover entire viewport */
        top: 0;
        left: 0;
        width: 100vw; /* Full viewport width */
        height: 100vh; /* Full viewport height */
        background-color: rgba(200, 200, 200, 0.9);
        pointer-events: auto; /* Allow mouse events */
    }

    </style>
</head>
<body>

    <!-- Updated Styles -->
<style>
    /* Canvas for Erasable Overlay */
    #erasable-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: rgba(200, 200, 200, 0.9);
        pointer-events: auto;
    }
</style>

<!-- HTML -->
<body>
    <!-- Password Overlay -->
    <div id="password-overlay">
        <div id="password-popup">
            <h2>&#128679Under Construction&#128679</h2>
            <input type="password" id="password-input" placeholder="&#128373Password?">
            <button id="password-submit">Submit</button>

            <!-- Erasable overlay -->
            <canvas id="erasable-overlay"></canvas>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const passwordOverlay = document.getElementById('password-overlay');
            const passwordPopup = document.getElementById('password-popup');
            const passwordInput = document.getElementById('password-input');
            const passwordSubmit = document.getElementById('password-submit');
            const correctPassword = "w";

            function checkPassword() {
                const enteredPassword = passwordInput.value;
                if (enteredPassword === correctPassword) {
                    passwordOverlay.style.display = 'none';
                } else {
                    alert('Incorrect password!');
                    passwordInput.value = '';
                }
            }

            passwordSubmit.addEventListener('click', checkPassword);
            passwordInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    checkPassword();
                }
            });

            // Erasable overlay effect setup
            const canvas = document.getElementById('erasable-overlay');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Draw initial overlay
            ctx.fillStyle = 'rgba(200, 200, 200, 0.9)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Eraser effect with larger, smoother strokes
            let isDrawing = false;
            const eraserSize = 90; // Three times original size

            canvas.addEventListener('mousedown', () => {
                isDrawing = true;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = eraserSize;
                ctx.lineCap = 'round';
            });

            canvas.addEventListener('mouseup', () => {
                isDrawing = false;
                ctx.beginPath(); // Reset path after mouse up to prevent line joining
            });

            canvas.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.beginPath(); // Start a new path at the end of each stroke for smoother lines
                ctx.moveTo(x, y);
            });
        });
    </script>
</body>

</html>
