<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Resume - Brayden Little</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        /* General styles */
        nav, header, .container {
            display: none; /* Hide main content until password is entered */
        }

        /* Password overlay */
        #password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #password-popup {
            position: relative;
            width: 300px;
            padding: 20px;
            border: 2px solid white;
            border-radius: 8px;
            background-color: black;
            color: white;
            text-align: center;
            box-shadow: 0 4px 8px rgba(255, 255, 255, 0.2);
        }

        #password-popup h2 {
            margin-bottom: 20px;
        }

        #password-input {
            padding: 10px;
            font-size: 16px;
            width: 100%;
            background-color: black;
            border: 2px solid white;
            color: white;
            text-align: center;
            border-radius: 5px;
        }

        #password-submit {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: black;
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            outline: none;
            margin-top: 10px;
        }

        /* Erasable overlay */
        #erasable-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(200, 200, 200, 0.9);
            font-size: 5em;
            color: #666;
            text-align: center;
            line-height: 1.5;
            pointer-events: none;
        }

        #erasable-overlay p {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            white-space: pre;
            font-family: monospace;
            text-align: center;
        }

    </style>
</head>
<body>

    <!-- Password Overlay -->
    <div id="password-overlay">
        <div id="password-popup">
            <h2>&#128679Under Construction&#128679</h2>
            <input type="password" id="password-input" placeholder="&#128373Password?">
            <button id="password-submit">Submit</button>

            <!-- Grey overlay with erasable effect -->
            <canvas id="erasable-overlay"></canvas>
            <p id="question-mark">
                ###########################\n
                ##########    ##########\n
                ##########    ##########\n
                ##########    ##########\n
                ##########    ##########\n
                ###########################\n
            </p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const passwordOverlay = document.getElementById('password-overlay');
            const passwordPopup = document.getElementById('password-popup');
            const passwordInput = document.getElementById('password-input');
            const passwordSubmit = document.getElementById('password-submit');
            const correctPassword = "w"; //<--- ignore this ;)

            // Password check function
            function checkPassword() {
                const enteredPassword = passwordInput.value;
                if (enteredPassword === correctPassword) {
                    passwordOverlay.style.display = 'none';
                    document.querySelector('nav').style.display = 'block';
                    document.querySelector('header').style.display = 'block';
                    document.querySelector('.container').style.display = 'block';
                } else {
                    alert('Incorrect password!');
                    passwordInput.value = '';  // Clear input for retry
                }
            }

            // Submit button click
            passwordSubmit.addEventListener('click', checkPassword);

            // "Enter" key press
            passwordInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    checkPassword();
                }
            });

            // Erasable overlay effect
            const canvas = document.getElementById('erasable-overlay');
            const ctx = canvas.getContext('2d');
            canvas.width = passwordPopup.clientWidth;
            canvas.height = passwordPopup.clientHeight;

            // Draw initial overlay with question mark text art
            ctx.fillStyle = 'rgba(200, 200, 200, 0.9)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = '5em monospace';
            ctx.fillStyle = '#666';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('?', canvas.width / 2, canvas.height / 2);

            // Eraser effect
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 20, 0, 2 * Math.PI); // Eraser radius ~2.5x cursor
                ctx.fill();
            });
        });
    </script>

</body>
</html>
