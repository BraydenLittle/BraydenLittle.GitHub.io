<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Resume - Brayden Little</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        /* Password overlay styles */
        #password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #password-popup {
            position: relative;
            width: 300px;
            padding: 20px;
            border: 2px solid white;
            border-radius: 8px;
            background-color: black;
            color: white;
            text-align: center;
            box-shadow: 0 4px 8px rgba(255, 255, 255, 0.2);
        }

        #password-input {
            padding: 10px;
            font-size: 16px;
            width: 100%;
            background-color: black;
            border: 2px solid white;
            color: white;
            text-align: center;
            border-radius: 5px;
        }

        #password-submit {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: black;
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            outline: none;
            margin-top: 10px;
        }

        /* Canvas for Erasable Overlay */
        #erasable-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; /* Match width of the password popup */
            height: 100%; /* Match height of the password popup */
            pointer-events: auto; /* Ensure it captures events */
        }
    </style>
</head>
<body>

    <!-- Password Overlay -->
    <div id="password-overlay">
        <div id="password-popup">
            <h2>&#128679Under Construction&#128679</h2>
            <input type="password" id="password-input" placeholder="&#128373Password?">
            <button id="password-submit">Submit</button>

            <!-- Erasable overlay -->
            <canvas id="erasable-overlay"></canvas>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const passwordOverlay = document.getElementById('password-overlay');
            const passwordInput = document.getElementById('password-input');
            const passwordSubmit = document.getElementById('password-submit');
            const correctPassword = "w";

            function checkPassword() {
                const enteredPassword = passwordInput.value;
                if (enteredPassword === correctPassword) {
                    passwordOverlay.style.display = 'none';
                } else {
                    alert('Incorrect password!');
                    passwordInput.value = '';
                }
            }

            passwordSubmit.addEventListener('click', checkPassword);
            passwordInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    checkPassword();
                }
            });

            // Erasable overlay effect setup
            const canvas = document.getElementById('erasable-overlay');
            const ctx = canvas.getContext('2d');
            canvas.width = 300; // Match width of the password popup
            canvas.height = 200; // Match height of the password popup

            // Draw initial overlay
            ctx.fillStyle = 'black'; // Set to black for the background
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let isDrawing = false;
            const eraserSize = 90;
            let erasedPixels = 0;
            const totalPixels = canvas.width * canvas.height;

            function updateErasureProgress() {
                const overallErasedPercentage = (erasedPixels / (totalPixels / 4)) * 100;

                // Check if grey overlay is 50% erased
                if (overallErasedPercentage >= 50) {
                    // Remove both black overlays
                    passwordOverlay.style.backgroundColor = 'transparent'; // Optionally, adjust the overlay
                    canvas.style.pointerEvents = 'none'; // Allow interaction with password popup
                }
            }

            // Eraser logic
            canvas.addEventListener('mousedown', () => {
                isDrawing = true;
                ctx.globalCompositeOperation = 'destination-out';
            });

            canvas.addEventListener('mouseup', () => {
                isDrawing = false;
                ctx.beginPath();
            });

            canvas.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;

                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                ctx.beginPath();
                ctx.arc(x, y, eraserSize / 2, 0, 2 * Math.PI);
                ctx.fill();

                erasedPixels += Math.PI * Math.pow(eraserSize / 2, 2);
                updateErasureProgress();
            });

            // Click event for erasing
            canvas.addEventListener('click', (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                ctx.beginPath();
                ctx.arc(x, y, eraserSize / 2, 0, 2 * Math.PI);
                ctx.fill();

                erasedPixels += Math.PI * Math.pow(eraserSize / 2, 2);
                updateErasureProgress();
            });
        });
    </script>

</body>
</html>
