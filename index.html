<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Resume - Brayden Little</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        /* Password overlay styles */
        #password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #password-popup {
            position: relative;
            width: 300px;
            padding: 20px;
            border: 2px solid white;
            border-radius: 8px;
            background-color: black;
            color: white;
            text-align: center;
            box-shadow: 0 4px 8px rgba(255, 255, 255, 0.2);
        }

        #password-popup h2 {
            margin-bottom: 20px;
        }

        #password-input {
            padding: 10px;
            font-size: 16px;
            width: 100%;
            background-color: black;
            border: 2px solid white;
            color: white;
            text-align: center;
            border-radius: 5px;
        }

        #password-submit {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: black;
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            outline: none;
            margin-top: 10px;
        }

        /* Overlay styles */
        #erasable-overlay {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: auto; /* Allow interaction */
        }

        #black-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 300px; /* Match password popup width */
            height: 300px; /* Match password popup height */
            background-color: black;
            z-index: 10; /* Above the password popup */
        }
    </style>
</head>

<body>
    <!-- Password Overlay -->
    <div id="password-overlay">
        <div id="password-popup">
            <h2>&#128679Under Construction&#128679</h2>
            <input type="password" id="password-input" placeholder="&#128373Password?">
            <button id="password-submit">Submit</button>

            <!-- Black overlay -->
            <div id="black-overlay"></div>
            <!-- Erasable overlay -->
            <canvas id="erasable-overlay"></canvas>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const passwordOverlay = document.getElementById('password-overlay');
            const passwordPopup = document.getElementById('password-popup');
            const passwordInput = document.getElementById('password-input');
            const passwordSubmit = document.getElementById('password-submit');
            const blackOverlay = document.getElementById('black-overlay');
            const canvas = document.getElementById('erasable-overlay');
            const ctx = canvas.getContext('2d');
            const correctPassword = "w";

            function checkPassword() {
                const enteredPassword = passwordInput.value;
                if (enteredPassword === correctPassword) {
                    passwordOverlay.style.display = 'none';
                } else {
                    alert('Incorrect password!');
                    passwordInput.value = '';
                }
            }

            passwordSubmit.addEventListener('click', checkPassword);
            passwordInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    checkPassword();
                }
            });

            // Set canvas size to match the password popup
            canvas.width = passwordPopup.clientWidth;
            canvas.height = passwordPopup.clientHeight;

            // Draw initial overlay
            ctx.fillStyle = 'black'; // Change erased background colour to black
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let isDrawing = false;
            const eraserSize = 90;
            let erasedPixels = 0;
            const totalPixels = canvas.width * canvas.height;

            function updateErasureProgress() {
                const overallErasedPercentage = (erasedPixels / (totalPixels / 4)) * 100;

                // Allow interaction with password popup after 50% erased
                if (overallErasedPercentage >= 50) {
                    blackOverlay.style.display = 'none'; // Hide both black overlays
                    canvas.style.pointerEvents = 'none'; // Allow interaction with password popup
                }
            }

            // Handle erasure logic
            function erase(x, y) {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, eraserSize / 2, 0, Math.PI * 2);
                ctx.fill();
                
                const erasedData = ctx.getImageData(x - eraserSize / 2, y - eraserSize / 2, eraserSize, eraserSize).data;
                let count = 0;

                for (let i = 3; i < erasedData.length; i += 4) {
                    if (erasedData[i] === 0) count++; // Fully transparent pixels
                }

                erasedPixels += count;
                updateErasureProgress();
            }

            canvas.addEventListener('mousedown', (e) => {
                isDrawing = true;
                erase(e.clientX - canvas.getBoundingClientRect().left, e.clientY - canvas.getBoundingClientRect().top);
            });

            canvas.addEventListener('mouseup', () => {
                isDrawing = false;
                ctx.beginPath();
            });

            canvas.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;
                erase(e.clientX - canvas.getBoundingClientRect().left, e.clientY - canvas.getBoundingClientRect().top);
            });

            // Allow erasing on canvas click
            canvas.addEventListener('click', (e) => {
                erase(e.clientX - canvas.getBoundingClientRect().left, e.clientY - canvas.getBoundingClientRect().top);
            });
        });
    </script>
</body>
</html>
